<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>+タスタス 日払いモック | 出金エラー詳細</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap");
    :root{--primary:#E63946;--primary-2:#FF4757;--primary-soft:#FFE3E5;--accent:#2EC4B6;--accent-soft:#DDF8F5;--bg:#FAFBFC;--surface:#FFFFFF;--text:#0F172A;--muted:#64748B;--line:#E2E8F0;--success:#16A34A;--warning:#F59E0B;--warning-soft:#FEF3C7;--error:#DC2626;--error-soft:#FEE2E2;--shadow:0 1px 2px rgba(15,23,42,.04),0 8px 22px rgba(15,23,42,.05);--font:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#fff 0,#eef2f7 55%,#e2e8f0 100%);font-family:var(--font);color:var(--text);font-feature-settings:"palt"}.device{width:390px;height:844px;padding:8px;border-radius:56px;background:linear-gradient(145deg,#111827,#020617);box-shadow:0 28px 70px rgba(15,23,42,.28),inset 0 0 0 1px rgba(255,255,255,.08);position:relative}.screen{height:100%;border-radius:48px;background:var(--bg);overflow:hidden;position:relative}.notch{position:absolute;z-index:20;top:8px;left:50%;width:118px;height:34px;transform:translateX(-50%);background:#020617;border-radius:0 0 20px 20px}.status{height:47px;padding:13px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;font-size:13px;font-weight:700;position:relative;z-index:10}.status-icons{display:flex;gap:5px;align-items:center}.sig{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,3px);gap:2px;align-items:end}.sig i{display:block;width:3px;border-radius:2px;background:#0f172a}.sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:10px}.wifi{width:15px;height:11px;border:2px solid #0f172a;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:12px 12px 0 0}.bat{width:24px;height:12px;border:1.8px solid #0f172a;border-radius:4px;position:relative}.bat:before{content:"";position:absolute;right:-4px;top:3px;width:2px;height:5px;background:#0f172a;border-radius:2px}.bat:after{content:"";position:absolute;left:2px;top:2px;width:16px;height:6px;background:#0f172a;border-radius:2px}.topbar{height:56px;padding:0 18px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center}.icon-btn{width:40px;height:40px;border:1px solid var(--line);border-radius:20px;background:#fff;display:grid;place-items:center;color:var(--text);box-shadow:0 1px 2px rgba(15,23,42,.03)}.title{text-align:center;font-size:18px;font-weight:800}.content{padding:8px 18px 200px}.hero{padding:22px 18px 20px;text-align:center;background:linear-gradient(180deg,#fff 0%,#fff8f8 100%);border:1px solid #FECACA;border-radius:18px;box-shadow:var(--shadow)}.warn-icon{width:78px;height:78px;border-radius:39px;background:var(--error-soft);display:grid;place-items:center;color:var(--error);margin:0 auto 14px;box-shadow:0 10px 22px rgba(220,38,38,.1)}h1{font-size:21px;line-height:1.45;margin:0 0 10px}.lead{font-size:14px;line-height:1.8;color:var(--muted);margin:0}.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.reason{margin-top:14px;padding:17px}.reason h2{font-size:16px;margin:0 0 12px}.reason-row{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--line)}.reason-row:first-of-type{border-top:0;padding-top:0}.reason-row svg{color:var(--warning);flex:0 0 auto;margin-top:2px}.reason-row b{font-size:14px}.reason-row p{margin:3px 0 0;font-size:12px;line-height:1.65;color:var(--muted)}.bank{margin-top:14px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.bank small{display:block;color:var(--muted);font-size:12px;font-weight:700;margin-bottom:3px}.bank b{font-size:15px}.chip{border-radius:999px;background:var(--error-soft);color:var(--error);font-size:11px;font-weight:800;padding:6px 9px;white-space:nowrap}.bottom-action{position:absolute;left:0;right:0;bottom:80px;padding:12px 18px 28px;background:linear-gradient(180deg,rgba(250,251,252,0),#fff 28%);z-index:5}.primary-btn{height:56px;border:0;border-radius:28px;font-family:var(--font);font-weight:800;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .18s ease,box-shadow .18s ease;box-shadow:0 10px 18px rgba(230,57,70,.22)}.primary-btn:hover{transform:translateY(-1px);box-shadow:0 14px 22px rgba(230,57,70,.26)}.links{display:flex;justify-content:center;gap:18px;margin-top:12px}.links a{font-size:13px;color:var(--primary);font-weight:800;text-decoration:none}.tabs{position:absolute;left:0;right:0;bottom:0;min-height:56px;height:80px;padding:8px 10px 10px;background:#FF3333;border-top:0;display:grid;grid-template-columns:repeat(5,1fr);z-index:8}.tab{min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(255,255,255,.7);font-size:10px;font-weight:700}.tab.active{color:#fff}.tab-icon{width:32px;height:32px;border-radius:10px;display:grid;place-items:center}.tab.active .tab-icon{background:rgba(255,255,255,.2)}.tab svg{width:24px;height:24px}.home-indicator{position:absolute;left:50%;bottom:7px;width:134px;height:5px;transform:translateX(-50%);border-radius:5px;background:#0f172a;z-index:12}
  </style>
</head>
<body>
  <div class="device"><div class="screen">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><div class="status-icons"><span class="sig"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="bat"></span></div></div>
    <header class="topbar"><button class="icon-btn"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="title">受け取りの確認</div><div></div></header>
    <main class="content">
      <section class="hero">
        <div class="warn-icon"><svg width="42" height="42" viewBox="0 0 24 24" fill="none"><path d="M12 8v5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M12 17h.01" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/><path d="M10.3 4.4 3 17.2A2 2 0 0 0 4.7 20h14.6a2 2 0 0 0 1.7-2.8L13.7 4.4a2 2 0 0 0-3.4 0Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></div>
        <h1>口座を確認できませんでした</h1>
        <p class="lead">この口座では受け取れません。別の口座を登録してください。</p>
      </section>
      <section class="card reason">
        <h2>よくある原因</h2>
        <div class="reason-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m6 12 4 4 8-8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg><div><b>口座番号の桁ちがい</b><p>数字が1桁足りない、または多い場合があります。</p></div></div>
        <div class="reason-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m6 12 4 4 8-8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg><div><b>支店名・口座種別の選択違い</b><p>普通・当座、支店名をもう一度確認してください。</p></div></div>
      </section>
      <section class="card bank"><div><small>確認できなかった口座</small><b>みずほ銀行 普通 ****1234</b></div><span class="chip">確認が必要</span></section>
    </main>
    <div class="bottom-action"><button class="primary-btn">受取口座を直す</button><div class="links"><a href="#">再試行する</a><a href="#">ヘルプを見る</a></div></div>
    <nav class="tabs" aria-label="下部ナビ">
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m16 16 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span><span>探す</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>保存済み</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v6A2.5 2.5 0 0 1 16.5 15H10l-4 4v-4.5A2.5 2.5 0 0 1 5 12.5v-6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></span><span>メッセージ</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/><path d="M4 8h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="2"/></svg></span><span>仕事管理</span></div>
      <div class="tab active"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M5 21a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span><span>マイページ</span></div>
    </nav>
    <div class="home-indicator"></div>
  </div></div>
</body>
</html>
