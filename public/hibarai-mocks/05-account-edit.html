<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>+タスタス 日払いモック | 受取口座変更</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap");
    :root{--primary:#E63946;--primary-2:#FF4757;--primary-soft:#FFE3E5;--accent:#2EC4B6;--accent-soft:#DDF8F5;--bg:#FAFBFC;--surface:#FFFFFF;--text:#0F172A;--muted:#64748B;--line:#E2E8F0;--success:#16A34A;--warning:#F59E0B;--shadow:0 1px 2px rgba(15,23,42,.04),0 8px 22px rgba(15,23,42,.05);--font:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#fff 0,#eef2f7 55%,#e2e8f0 100%);font-family:var(--font);color:var(--text);font-feature-settings:"palt"}.device{width:390px;height:844px;padding:8px;border-radius:56px;background:linear-gradient(145deg,#111827,#020617);box-shadow:0 28px 70px rgba(15,23,42,.28),inset 0 0 0 1px rgba(255,255,255,.08);position:relative}.screen{height:100%;border-radius:48px;background:var(--bg);overflow:hidden;position:relative}.notch{position:absolute;z-index:20;top:8px;left:50%;width:118px;height:34px;transform:translateX(-50%);background:#020617;border-radius:0 0 20px 20px}.status{height:47px;padding:13px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;font-size:13px;font-weight:700;position:relative;z-index:10}.status-icons{display:flex;gap:5px;align-items:center}.sig{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,3px);gap:2px;align-items:end}.sig i{display:block;width:3px;border-radius:2px;background:#0f172a}.sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:10px}.wifi{width:15px;height:11px;border:2px solid #0f172a;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:12px 12px 0 0}.bat{width:24px;height:12px;border:1.8px solid #0f172a;border-radius:4px;position:relative}.bat:before{content:"";position:absolute;right:-4px;top:3px;width:2px;height:5px;background:#0f172a;border-radius:2px}.bat:after{content:"";position:absolute;left:2px;top:2px;width:16px;height:6px;background:#0f172a;border-radius:2px}.topbar{height:56px;padding:0 18px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center}.icon-btn{width:40px;height:40px;border:1px solid var(--line);border-radius:20px;background:#fff;display:grid;place-items:center;color:var(--text);box-shadow:0 1px 2px rgba(15,23,42,.03)}.title{text-align:center;font-size:18px;font-weight:800}.content{padding:2px 18px 202px}.steps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:2px 0 16px}.step{position:relative;text-align:center;font-size:11px;font-weight:800;color:var(--muted);padding-top:18px}.step:before{content:"";position:absolute;left:0;right:0;top:6px;height:4px;border-radius:4px;background:#E2E8F0}.step.done:before{background:var(--accent)}.step.now{color:var(--primary)}.step.now:before{background:linear-gradient(90deg,var(--primary),var(--primary-2))}.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.summary{padding:17px 18px}.card-title{font-size:13px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:10px}.bank-name{font-size:17px;font-weight:800}.bank-detail{font-size:13px;color:var(--muted);margin-top:5px}.verify{margin-top:14px;padding:19px 18px}.verify h1{font-size:18px;margin:0 0 7px}.verify p{margin:0;color:var(--muted);font-size:13px;line-height:1.7}.code{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:20px 0 14px}.digit{height:52px;border:1.5px solid #CBD5E1;border-radius:14px;background:#fff;display:grid;place-items:center;font-size:22px;font-weight:800;font-feature-settings:"tnum"}.digit.active{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}.resend{border:0;background:transparent;color:var(--primary);font-family:var(--font);font-size:14px;font-weight:800;padding:8px 0}.notice{margin-top:12px;border-radius:14px;background:#F8FAFC;border:1px solid var(--line);padding:13px 14px;display:flex;gap:10px;color:var(--muted);font-size:12px;line-height:1.65}.notice svg{color:var(--accent);flex:0 0 auto;margin-top:2px}.bottom-action{position:absolute;left:0;right:0;bottom:80px;padding:13px 18px 28px;background:linear-gradient(180deg,rgba(250,251,252,0),#fff 26%);z-index:5}.primary-btn{height:56px;border:0;border-radius:28px;font-family:var(--font);font-weight:800;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .18s ease,box-shadow .18s ease;box-shadow:0 10px 18px rgba(230,57,70,.22)}.primary-btn:hover{transform:translateY(-1px);box-shadow:0 14px 22px rgba(230,57,70,.26)}.tabs{position:absolute;left:0;right:0;bottom:0;min-height:56px;height:80px;padding:8px 10px 10px;background:#FF3333;border-top:0;display:grid;grid-template-columns:repeat(5,1fr);z-index:8}.tab{min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(255,255,255,.7);font-size:10px;font-weight:700}.tab.active{color:#fff}.tab-icon{width:32px;height:32px;border-radius:10px;display:grid;place-items:center}.tab.active .tab-icon{background:rgba(255,255,255,.2)}.tab svg{width:24px;height:24px}.home-indicator{position:absolute;left:50%;bottom:7px;width:134px;height:5px;transform:translateX(-50%);border-radius:5px;background:#0f172a;z-index:12}
  </style>
</head>
<body>
  <div class="device"><div class="screen">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><div class="status-icons"><span class="sig"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="bat"></span></div></div>
    <header class="topbar"><button class="icon-btn"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="title">受取口座 変更</div><div></div></header>
    <main class="content">
      <div class="steps"><div class="step done">口座入力</div><div class="step now">本人確認</div><div class="step">完了</div></div>
      <section class="card summary">
        <div class="card-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 10h16M6 10v8M10 10v8M14 10v8M18 10v8M4 20h16M12 4l8 4H4l8-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>入力済み口座情報</div>
        <div class="bank-name">三井住友銀行 普通 ****6789</div>
        <div class="bank-detail">新宿支店・佐藤美咲さん名義</div>
      </section>
      <section class="card verify">
        <h1>SMS認証コードを入力</h1>
        <p>登録電話番号（080-****-2468）に6桁のコードを送りました。</p>
        <div class="code" aria-label="6桁認証コード"><div class="digit">3</div><div class="digit">8</div><div class="digit">1</div><div class="digit active"></div><div class="digit"></div><div class="digit"></div></div>
        <button class="resend">コードを再送</button>
      </section>
      <div class="notice"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 8v5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M12 17h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg><span>口座変更後は安全確認のため、しばらく受け取りを停止する場合があります。</span></div>
    </main>
    <div class="bottom-action"><button class="primary-btn">確認する</button></div>
    <nav class="tabs" aria-label="下部ナビ">
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m16 16 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span><span>探す</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>保存済み</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v6A2.5 2.5 0 0 1 16.5 15H10l-4 4v-4.5A2.5 2.5 0 0 1 5 12.5v-6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></span><span>メッセージ</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/><path d="M4 8h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="2"/></svg></span><span>仕事管理</span></div>
      <div class="tab active"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M5 21a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span><span>マイページ</span></div>
    </nav>
    <div class="home-indicator"></div>
  </div></div>
</body>
</html>
