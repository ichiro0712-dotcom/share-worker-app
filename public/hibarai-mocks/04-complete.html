    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap");
    :root{--primary:#E63946;--primary-2:#FF4757;--primary-soft:#FFE3E5;--accent:#2EC4B6;--accent-soft:#DDF8F5;--bg:#FAFBFC;--surface:#FFFFFF;--text:#0F172A;--muted:#64748B;--line:#E2E8F0;--success:#16A34A;--success-soft:#DCFCE7;--shadow:0 1px 2px rgba(15,23,42,.04),0 8px 22px rgba(15,23,42,.05);--font:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#fff 0,#eef2f7 55%,#e2e8f0 100%);font-family:var(--font);color:var(--text);font-feature-settings:"palt"}.device{width:390px;height:844px;padding:8px;border-radius:56px;background:linear-gradient(145deg,#111827,#020617);box-shadow:0 28px 70px rgba(15,23,42,.28),inset 0 0 0 1px rgba(255,255,255,.08);position:relative}.screen{height:100%;border-radius:48px;background:linear-gradient(180deg,#fff 0,#FAFBFC 62%,#F8FAFC 100%);overflow:hidden;position:relative}.notch{position:absolute;z-index:20;top:8px;left:50%;width:118px;height:34px;transform:translateX(-50%);background:#020617;border-radius:0 0 20px 20px}.status{height:47px;padding:13px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;font-size:13px;font-weight:700;position:relative;z-index:10}.status-icons{display:flex;gap:5px;align-items:center}.sig{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,3px);gap:2px;align-items:end}.sig i{display:block;width:3px;border-radius:2px;background:#0f172a}.sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:10px}.wifi{width:15px;height:11px;border:2px solid #0f172a;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:12px 12px 0 0}.bat{width:24px;height:12px;border:1.8px solid #0f172a;border-radius:4px;position:relative}.bat:before{content:"";position:absolute;right:-4px;top:3px;width:2px;height:5px;background:#0f172a;border-radius:2px}.bat:after{content:"";position:absolute;left:2px;top:2px;width:16px;height:6px;background:#0f172a;border-radius:2px}.topbar{height:52px;padding:0 18px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center}.icon-btn{width:40px;height:40px;border:1px solid var(--line);border-radius:20px;background:#fff;display:grid;place-items:center;color:var(--text);box-shadow:0 1px 2px rgba(15,23,42,.03)}.brand{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:14px;color:var(--muted)}.brand-mark{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;display:grid;place-items:center;font-size:17px}.content{padding:16px 22px 196px;text-align:center}.success-wrap{width:112px;height:112px;border-radius:56px;margin:28px auto 22px;background:radial-gradient(circle,#fff 46%,var(--success-soft) 47%);display:grid;place-items:center;position:relative;box-shadow:0 12px 34px rgba(22,163,74,.16)}.success-wrap:before{content:"";position:absolute;inset:10px;border-radius:50%;border:2px solid rgba(22,163,74,.18)}.check{width:64px;height:64px;border-radius:32px;background:linear-gradient(135deg,#16A34A,#2EC4B6);display:grid;place-items:center;color:#fff;box-shadow:0 10px 20px rgba(22,163,74,.23);animation:pop .7s ease both}.check path{stroke-dasharray:36;stroke-dashoffset:36;animation:draw .9s .25s ease forwards}@keyframes pop{0%{transform:scale(.82);opacity:.4}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}@keyframes draw{to{stroke-dashoffset:0}}h1{font-size:22px;line-height:1.45;margin:0 0 10px}p{margin:0;color:var(--muted);font-size:14px;line-height:1.75}.amount-card{margin:24px 0 18px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}.amount{font-size:34px;font-weight:800;font-feature-settings:"tnum";letter-spacing:0}.amount-label{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:4px}.steps{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;text-align:left;box-shadow:0 1px 2px rgba(15,23,42,.04)}.step{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;position:relative;padding:0 0 18px}.step:last-child{padding-bottom:0}.step:not(:last-child):after{content:"";position:absolute;left:14px;top:30px;width:2px;height:22px;background:var(--line)}.step-dot{width:30px;height:30px;border-radius:15px;display:grid;place-items:center;font-size:12px;font-weight:800;background:var(--success-soft);color:var(--success);z-index:1}.step.now .step-dot{background:#DBEAFE;color:#2563EB}.step.next .step-dot{background:#F1F5F9;color:#94A3B8}.step-title{font-size:14px;font-weight:800}.step-sub{font-size:11px;color:var(--muted);margin-top:2px}.badge{font-size:11px;font-weight:800;border-radius:999px;padding:5px 8px;background:#DBEAFE;color:#2563EB}.bottom-action{position:absolute;left:0;right:0;bottom:80px;padding:12px 18px 28px;background:linear-gradient(180deg,rgba(250,251,252,0),#fff 28%);display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary-btn,.plain-btn{height:54px;border-radius:27px;font-family:var(--font);font-weight:800;font-size:15px;transition:transform .18s ease,box-shadow .18s ease}.primary-btn{border:0;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));box-shadow:0 10px 18px rgba(230,57,70,.22)}.plain-btn{border:1px solid var(--line);background:#fff;color:var(--text)}.primary-btn:hover,.plain-btn:hover{transform:translateY(-1px)}.tabs{position:absolute;left:0;right:0;bottom:0;min-height:56px;height:80px;padding:8px 10px 10px;background:#FF3333;border-top:0;display:grid;grid-template-columns:repeat(5,1fr);z-index:8}.tab{min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(255,255,255,.7);font-size:10px;font-weight:700}.tab.active{color:#fff}.tab-icon{width:32px;height:32px;border-radius:10px;display:grid;place-items:center}.tab.active .tab-icon{background:rgba(255,255,255,.2)}.tab svg{width:24px;height:24px}.home-indicator{position:absolute;left:50%;bottom:7px;width:134px;height:5px;transform:translateX(-50%);border-radius:5px;background:#0f172a;z-index:12}
