<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>+タスタス 日払いモック | 確認ボトムシート</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap");
    :root{--primary:#E63946;--primary-2:#FF4757;--primary-soft:#FFE3E5;--accent:#2EC4B6;--accent-soft:#DDF8F5;--bg:#FAFBFC;--surface:#FFFFFF;--text:#0F172A;--muted:#64748B;--line:#E2E8F0;--shadow:0 1px 2px rgba(15,23,42,.04),0 8px 22px rgba(15,23,42,.05);--font:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#fff 0,#eef2f7 55%,#e2e8f0 100%);font-family:var(--font);color:var(--text);font-feature-settings:"palt"}.device{width:390px;height:844px;padding:8px;border-radius:56px;background:linear-gradient(145deg,#111827,#020617);box-shadow:0 28px 70px rgba(15,23,42,.28),inset 0 0 0 1px rgba(255,255,255,.08);position:relative}.screen{height:100%;border-radius:48px;background:var(--bg);overflow:hidden;position:relative}.notch{position:absolute;z-index:20;top:8px;left:50%;width:118px;height:34px;transform:translateX(-50%);background:#020617;border-radius:0 0 20px 20px}.status{height:47px;padding:13px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;font-size:13px;font-weight:700;position:relative;z-index:10}.status-icons{display:flex;gap:5px;align-items:center}.sig{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,3px);gap:2px;align-items:end}.sig i{display:block;width:3px;border-radius:2px;background:#0f172a}.sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:10px}.wifi{width:15px;height:11px;border:2px solid #0f172a;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:12px 12px 0 0}.bat{width:24px;height:12px;border:1.8px solid #0f172a;border-radius:4px;position:relative}.bat:before{content:"";position:absolute;right:-4px;top:3px;width:2px;height:5px;background:#0f172a;border-radius:2px}.bat:after{content:"";position:absolute;left:2px;top:2px;width:16px;height:6px;background:#0f172a;border-radius:2px}.topbar{height:56px;padding:0 18px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center}.icon-btn{width:40px;height:40px;border:1px solid var(--line);border-radius:20px;background:#fff;display:grid;place-items:center;color:var(--text);box-shadow:0 1px 2px rgba(15,23,42,.03)}.title{text-align:center;font-size:18px;font-weight:800}.content{padding:4px 18px 202px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.amount-card{padding:20px}.label{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:10px}.amount-row{height:82px;border:1.5px solid #CBD5E1;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px 0 18px}.amount{font-size:40px;font-weight:800;font-feature-settings:"tnum";letter-spacing:0}.chip{height:34px;border-radius:17px;border:0;background:var(--primary-soft);color:var(--primary);font-weight:800;padding:0 13px;font-family:var(--font)}.breakdown{margin-top:14px;padding:4px 18px}.line{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--line);font-size:15px}.line:last-child{border-bottom:0}.line strong{font-size:20px;font-weight:800;font-feature-settings:"tnum"}.fee{color:var(--muted);font-feature-settings:"tnum"}.bank{margin-top:14px;padding:17px 18px}.bank-head{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px;font-weight:800;margin-bottom:10px}.bank-main{font-size:16px;font-weight:800}.bank-sub{font-size:12px;color:var(--muted);margin-top:4px}.dim{position:absolute;inset:0;background:rgba(15,23,42,.36);z-index:30;backdrop-filter:blur(2px)}.sheet{position:absolute;left:0;right:0;bottom:80px;z-index:40;background:#fff;border-radius:28px 28px 0 0;padding:13px 18px 30px;box-shadow:0 -18px 40px rgba(15,23,42,.18)}.grab{width:44px;height:5px;border-radius:5px;background:#CBD5E1;margin:0 auto 18px}.sheet h1{font-size:20px;line-height:1.45;margin:0 0 6px;text-align:center}.sheet p{margin:0 0 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7}.summary{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}.summary-row{display:flex;justify-content:space-between;gap:16px;padding:13px 15px;border-bottom:1px solid var(--line);font-size:14px}.summary-row:last-child{border-bottom:0}.summary-row span:first-child{color:var(--muted);font-weight:700}.summary-row b{font-feature-settings:"tnum";text-align:right}.summary-row.total b{font-size:20px;color:var(--primary)}.actions{display:grid;gap:10px;margin-top:16px}.primary-btn,.plain-btn{height:56px;border-radius:28px;font-family:var(--font);font-weight:800;font-size:16px;transition:transform .18s ease,box-shadow .18s ease}.primary-btn{border:0;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));box-shadow:0 10px 18px rgba(230,57,70,.22)}.primary-btn:hover{transform:translateY(-1px);box-shadow:0 14px 22px rgba(230,57,70,.26)}.plain-btn{border:1px solid var(--line);background:#fff;color:var(--text)}.bottom-action{position:absolute;left:0;right:0;bottom:80px;padding:13px 18px 28px;background:linear-gradient(180deg,rgba(250,251,252,0),#fff 26%);z-index:5}.tabs{position:absolute;left:0;right:0;bottom:0;min-height:56px;height:80px;padding:8px 10px 10px;background:#FF3333;border-top:0;display:grid;grid-template-columns:repeat(5,1fr);z-index:45}.tab{min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(255,255,255,.7);font-size:10px;font-weight:700}.tab.active{color:#fff}.tab-icon{width:32px;height:32px;border-radius:10px;display:grid;place-items:center}.tab.active .tab-icon{background:rgba(255,255,255,.2)}.tab svg{width:24px;height:24px}.home-indicator{position:absolute;left:50%;bottom:7px;width:134px;height:5px;transform:translateX(-50%);border-radius:5px;background:#0f172a;z-index:50}
  </style>
</head>
<body>
  <div class="device"><div class="screen">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><div class="status-icons"><span class="sig"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="bat"></span></div></div>
    <header class="topbar"><button class="icon-btn"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="title">受け取る</div><div></div></header>
    <main class="content">
      <section class="card amount-card"><div class="label">受け取る金額</div><div class="amount-row"><div class="amount">¥12,480</div><button class="chip">全額</button></div></section>
      <section class="card breakdown"><div class="line"><span>手数料</span><span class="fee">¥143</span></div><div class="line"><span>振込予定額</span><strong>¥12,337</strong></div></section>
      <section class="card bank"><div class="bank-head"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 10h16M6 10v8M10 10v8M14 10v8M18 10v8M4 20h16M12 4l8 4H4l8-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>受取口座</div><div class="bank-main">みずほ銀行 普通 ****1234</div><div class="bank-sub">佐藤美咲さん名義</div></section>
    </main>
    <div class="bottom-action"><button class="primary-btn" style="width:100%">受け取る</button></div>
    <div class="dim"></div>
    <section class="sheet" aria-label="確認">
      <div class="grab"></div>
      <h1>この内容で受け取りますか？</h1>
      <p>手数料を引いた金額を、登録済みの受取口座へ振り込みます。</p>
      <div class="summary">
        <div class="summary-row"><span>受け取る金額</span><b>¥12,480</b></div>
        <div class="summary-row"><span>手数料</span><b>¥143</b></div>
        <div class="summary-row total"><span>振込予定額</span><b>¥12,337</b></div>
        <div class="summary-row"><span>受取口座</span><b>みずほ銀行<br>****1234</b></div>
      </div>
      <div class="actions"><button class="primary-btn">受け取る</button><button class="plain-btn">キャンセル</button></div>
    </section>
    <nav class="tabs" aria-label="下部ナビ">
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m16 16 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span><span>探す</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>保存済み</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v6A2.5 2.5 0 0 1 16.5 15H10l-4 4v-4.5A2.5 2.5 0 0 1 5 12.5v-6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></span><span>メッセージ</span></div>
      <div class="tab"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/><path d="M4 8h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="2"/></svg></span><span>仕事管理</span></div>
      <div class="tab active"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M5 21a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span><span>マイページ</span></div>
    </nav>
    <div class="home-indicator"></div>
  </div></div>
</body>
</html>
