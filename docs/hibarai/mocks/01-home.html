<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>+タスタス 日払いモック | お金タブ</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap");
    :root{--primary:#E63946;--primary-2:#FF4757;--primary-soft:#FFE3E5;--accent:#2EC4B6;--accent-soft:#DDF8F5;--bg:#FAFBFC;--surface:#FFFFFF;--text:#0F172A;--muted:#64748B;--line:#E2E8F0;--success:#16A34A;--success-soft:#DCFCE7;--warning:#F59E0B;--warning-soft:#FEF3C7;--error:#DC2626;--error-soft:#FEE2E2;--shadow:0 1px 2px rgba(15,23,42,.04),0 8px 22px rgba(15,23,42,.05);--font:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#fff 0,#eef2f7 55%,#e2e8f0 100%);font-family:var(--font);color:var(--text);font-feature-settings:"palt"} .device{width:390px;height:844px;padding:8px;border-radius:56px;background:linear-gradient(145deg,#111827,#020617);box-shadow:0 28px 70px rgba(15,23,42,.28),inset 0 0 0 1px rgba(255,255,255,.08);position:relative}.screen{height:100%;border-radius:48px;background:var(--bg);overflow:hidden;position:relative}.notch{position:absolute;z-index:20;top:8px;left:50%;width:118px;height:34px;transform:translateX(-50%);background:#020617;border-radius:0 0 20px 20px}.status{height:47px;padding:13px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;font-size:13px;font-weight:700;position:relative;z-index:10}.status-icons{display:flex;align-items:center;gap:5px}.sig{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,3px);gap:2px;align-items:end}.sig i{display:block;width:3px;border-radius:2px;background:#0f172a}.sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:10px}.wifi{width:15px;height:11px;border:2px solid #0f172a;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:12px 12px 0 0}.bat{width:24px;height:12px;border:1.8px solid #0f172a;border-radius:4px;position:relative}.bat:before{content:"";position:absolute;right:-4px;top:3px;width:2px;height:5px;background:#0f172a;border-radius:2px}.bat:after{content:"";position:absolute;left:2px;top:2px;width:16px;height:6px;background:#0f172a;border-radius:2px}.app-header{height:54px;padding:0 18px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:9px;font-weight:800}.brand-mark{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;display:grid;place-items:center;font-size:21px;line-height:1;box-shadow:0 7px 14px rgba(230,57,70,.22)}.brand small{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-top:1px}.icon-btn{width:40px;height:40px;border:1px solid var(--line);border-radius:20px;background:#fff;display:grid;place-items:center;color:var(--text);box-shadow:0 1px 2px rgba(15,23,42,.03)}svg{display:block}.content{padding:0 16px 98px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.balance{padding:20px;background:linear-gradient(160deg,#fff 0%,#fff7f8 54%,#fff 100%);position:relative;overflow:hidden}.balance:after{content:"";position:absolute;right:-42px;top:-46px;width:138px;height:138px;border-radius:50%;background:rgba(255,71,87,.09)}.label{font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:6px}.amount{font-size:44px;line-height:1.1;font-weight:800;margin:9px 0 14px;font-feature-settings:"tnum";letter-spacing:0}.primary-btn,.secondary-btn{height:56px;border:0;border-radius:28px;font-family:var(--font);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .18s ease,box-shadow .18s ease}.primary-btn{width:100%;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));box-shadow:0 10px 18px rgba(230,57,70,.22)}.primary-btn:hover{transform:translateY(-1px);box-shadow:0 14px 22px rgba(230,57,70,.26)}.secondary-btn{height:44px;padding:0 18px;color:var(--primary);background:var(--primary-soft)}.row{display:flex;align-items:center;justify-content:space-between;gap:12px}.review{margin-top:12px;padding:14px 15px;background:linear-gradient(135deg,#fff,#f6fffd)}.review strong{font-size:16px}.review p{margin:4px 0 0;font-size:12px;color:var(--muted);line-height:1.6}.mini-icon{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;background:var(--accent-soft);color:#0f766e;flex:0 0 auto}.bank{margin-top:12px;padding:15px}.bank-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px}.bank-main{font-size:15px;font-weight:800}.link-btn{border:0;background:transparent;color:var(--primary);font-weight:800;font-family:var(--font);font-size:13px}.history{margin-top:16px}.section-title{font-size:17px;font-weight:800;margin:0 0 10px}.history-list{overflow:hidden}.history-item{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line);background:#fff}.history-item:last-child{border-bottom:0}.dot{width:28px;height:28px;border-radius:14px;display:grid;place-items:center}.dot.ok{background:var(--success-soft);color:var(--success)}.dot.wait{background:#EEF6FF;color:#2563EB}.dot.need{background:var(--warning-soft);color:#B45309}.h-main{font-size:13px;font-weight:800}.h-sub{font-size:11px;color:var(--muted);margin-top:2px}.chip{font-size:11px;font-weight:800;border-radius:999px;padding:5px 8px;white-space:nowrap}.chip.ok{color:var(--success);background:var(--success-soft)}.chip.wait{color:#2563EB;background:#DBEAFE}.chip.need{color:#B45309;background:var(--warning-soft)}.tabs{position:absolute;left:0;right:0;bottom:0;height:80px;padding:8px 10px 10px;background:rgba(255,255,255,.94);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);backdrop-filter:blur(14px);z-index:8}.tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#94A3B8;font-size:10px;font-weight:700}.tab.active{color:var(--primary)}.tab svg{width:21px;height:21px}.home-indicator{position:absolute;left:50%;bottom:7px;width:134px;height:5px;transform:translateX(-50%);border-radius:5px;background:#0f172a;z-index:12}
  </style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="notch"></div>
      <div class="status"><span>9:41</span><div class="status-icons"><span class="sig"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="bat"></span></div></div>
      <header class="app-header">
        <div class="brand"><div class="brand-mark">+</div><div>+タスタス<small>お金</small></div></div>
        <button class="icon-btn" aria-label="通知">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18.5a3 3 0 0 1-6 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M19 16H5c1.2-1.2 1.8-2.7 1.8-4.4V9.2a5.2 5.2 0 0 1 10.4 0v2.4c0 1.7.6 3.2 1.8 4.4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        </button>
      </header>
      <main class="content">
        <section class="card balance">
          <div class="label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 16.5v-9Z" stroke="currentColor" stroke-width="2"/><path d="M16 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            今すぐ受け取れる金額
          </div>
          <div class="amount">¥12,480</div>
          <button class="primary-btn">
            受け取る
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </section>
        <section class="card review row">
          <div class="row" style="justify-content:flex-start">
            <div class="mini-icon">
              <svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            </div>
            <div><strong>レビューすると ¥8,640 受け取れます</strong><p>青葉介護施設 5/26勤務分</p></div>
          </div>
          <button class="secondary-btn">30秒レビュー</button>
        </section>
        <section class="card bank">
          <div class="bank-title">受取口座</div>
          <div class="row"><div class="bank-main">みずほ銀行 普通 ****1234</div><button class="link-btn">変更</button></div>
        </section>
        <section class="history">
          <div class="row"><h2 class="section-title">履歴</h2><button class="link-btn">すべて見る</button></div>
          <div class="card history-list">
            <div class="history-item">
              <div class="dot ok"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="m6 12 4 4 8-8" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
              <div><div class="h-main">振込完了</div><div class="h-sub">5/27 みずほ銀行</div></div><div class="chip ok">¥10,000</div>
            </div>
            <div class="history-item">
              <div class="dot wait"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/></svg></div>
              <div><div class="h-main">チャージされました</div><div class="h-sub">5/26 青葉介護施設</div></div><div class="chip wait">¥8,640</div>
            </div>
            <div class="history-item">
              <div class="dot need"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 8v5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M12 17h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M10.3 4.4 3 17.2A2 2 0 0 0 4.7 20h14.6a2 2 0 0 0 1.7-2.8L13.7 4.4a2 2 0 0 0-3.4 0Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></div>
              <div><div class="h-main">確認が必要</div><div class="h-sub">口座を確認してください</div></div><div class="chip need">対応する</div>
            </div>
          </div>
        </section>
      </main>
      <nav class="tabs" aria-label="下部ナビ">
        <div class="tab"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m16 16 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>探す</span></div>
        <div class="tab"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/><path d="M4 8h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="2"/></svg><span>仕事</span></div>
        <div class="tab active"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 16.5v-9Z" stroke="currentColor" stroke-width="2"/><path d="M15 12h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>お金</span></div>
        <div class="tab"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v6A2.5 2.5 0 0 1 16.5 15H10l-4 4v-4.5A2.5 2.5 0 0 1 5 12.5v-6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span>メッセージ</span></div>
        <div class="tab"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M5 21a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>マイページ</span></div>
      </nav>
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
