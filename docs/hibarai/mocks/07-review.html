<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>+タスタス 日払いモック | レビュー提出</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap");
    :root{--primary:#E63946;--primary-2:#FF4757;--primary-soft:#FFE3E5;--accent:#2EC4B6;--accent-soft:#DDF8F5;--bg:#FAFBFC;--surface:#FFFFFF;--text:#0F172A;--muted:#64748B;--line:#E2E8F0;--warning:#F59E0B;--warning-soft:#FEF3C7;--shadow:0 1px 2px rgba(15,23,42,.04),0 8px 22px rgba(15,23,42,.05);--font:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#fff 0,#eef2f7 55%,#e2e8f0 100%);font-family:var(--font);color:var(--text);font-feature-settings:"palt"}.device{width:390px;height:844px;padding:8px;border-radius:56px;background:linear-gradient(145deg,#111827,#020617);box-shadow:0 28px 70px rgba(15,23,42,.28),inset 0 0 0 1px rgba(255,255,255,.08);position:relative}.screen{height:100%;border-radius:48px;background:var(--bg);overflow:hidden;position:relative}.notch{position:absolute;z-index:20;top:8px;left:50%;width:118px;height:34px;transform:translateX(-50%);background:#020617;border-radius:0 0 20px 20px}.status{height:47px;padding:13px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;font-size:13px;font-weight:700;position:relative;z-index:10}.status-icons{display:flex;gap:5px;align-items:center}.sig{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,3px);gap:2px;align-items:end}.sig i{display:block;width:3px;border-radius:2px;background:#0f172a}.sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:10px}.wifi{width:15px;height:11px;border:2px solid #0f172a;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:12px 12px 0 0}.bat{width:24px;height:12px;border:1.8px solid #0f172a;border-radius:4px;position:relative}.bat:before{content:"";position:absolute;right:-4px;top:3px;width:2px;height:5px;background:#0f172a;border-radius:2px}.bat:after{content:"";position:absolute;left:2px;top:2px;width:16px;height:6px;background:#0f172a;border-radius:2px}.topbar{height:56px;padding:0 18px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center}.icon-btn{width:40px;height:40px;border:1px solid var(--line);border-radius:20px;background:#fff;display:grid;place-items:center;color:var(--text);box-shadow:0 1px 2px rgba(15,23,42,.03)}.title{text-align:center;font-size:18px;font-weight:800}.content{padding:4px 18px 122px}.unlock{padding:15px 16px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 12px 26px rgba(230,57,70,.2);display:flex;align-items:center;gap:12px}.unlock-icon{width:42px;height:42px;border-radius:15px;background:rgba(255,255,255,.18);display:grid;place-items:center;flex:0 0 auto}.unlock b{font-size:16px}.unlock span{display:block;font-size:12px;margin-top:2px;opacity:.88}.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.work{margin-top:14px;padding:17px 18px}.facility{font-size:18px;font-weight:800;margin-bottom:10px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}.meta div{border-radius:12px;background:#F8FAFC;border:1px solid var(--line);padding:10px}.meta span{display:block;font-size:11px;color:var(--muted);font-weight:800;margin-bottom:3px}.meta b{font-size:13px}.rating{margin-top:14px;padding:18px}.question{font-size:16px;font-weight:800;margin-bottom:12px}.stars{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.star{height:52px;border:1px solid #FDE68A;border-radius:15px;background:#FFFBEB;color:var(--warning);display:grid;place-items:center;transition:transform .18s ease,box-shadow .18s ease}.star.active{background:linear-gradient(180deg,#FFF7D6,#FEF3C7);box-shadow:0 8px 16px rgba(245,158,11,.13)}.star:hover{transform:translateY(-1px)}.chips{margin-top:14px;padding:18px}.chip-grid{display:flex;flex-wrap:wrap;gap:9px}.chip{height:39px;border:1px solid var(--line);border-radius:20px;background:#fff;padding:0 13px;font-family:var(--font);font-size:13px;font-weight:800;color:var(--text)}.chip.selected{border-color:var(--accent);background:var(--accent-soft);color:#0F766E}.note{margin-top:12px;height:76px;border:1px solid var(--line);border-radius:14px;background:#F8FAFC;padding:12px 13px;color:var(--muted);font-size:13px;line-height:1.65}.bottom-action{position:absolute;left:0;right:0;bottom:0;padding:13px 18px 28px;background:linear-gradient(180deg,rgba(250,251,252,0),#fff 26%);z-index:5}.primary-btn{height:56px;border:0;border-radius:28px;font-family:var(--font);font-weight:800;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .18s ease,box-shadow .18s ease;box-shadow:0 10px 18px rgba(230,57,70,.22)}.primary-btn:hover{transform:translateY(-1px);box-shadow:0 14px 22px rgba(230,57,70,.26)}.home-indicator{position:absolute;left:50%;bottom:7px;width:134px;height:5px;transform:translateX(-50%);border-radius:5px;background:#0f172a;z-index:12}
  </style>
</head>
<body>
  <div class="device"><div class="screen">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><div class="status-icons"><span class="sig"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="bat"></span></div></div>
    <header class="topbar"><button class="icon-btn"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="title">30秒レビュー</div><div></div></header>
    <main class="content">
      <section class="unlock"><div class="unlock-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></div><div><b>レビューすると ¥8,640 受け取れます</b><span>送信後、お金タブに反映されます</span></div></section>
      <section class="card work"><div class="facility">青葉介護施設</div><div class="meta"><div><span>勤務日</span><b>5月26日(火)</b></div><div><span>時間</span><b>9:00-16:00</b></div></div></section>
      <section class="card rating"><div class="question">今回の勤務はいかがでしたか？</div><div class="stars" aria-label="5段階星評価">
        <div class="star active"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2.8 2.85 5.78 6.38.93-4.61 4.49 1.09 6.35L12 17.35l-5.71 3 1.09-6.35-4.61-4.49 6.38-.93L12 2.8Z"/></svg></div>
        <div class="star active"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2.8 2.85 5.78 6.38.93-4.61 4.49 1.09 6.35L12 17.35l-5.71 3 1.09-6.35-4.61-4.49 6.38-.93L12 2.8Z"/></svg></div>
        <div class="star active"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2.8 2.85 5.78 6.38.93-4.61 4.49 1.09 6.35L12 17.35l-5.71 3 1.09-6.35-4.61-4.49 6.38-.93L12 2.8Z"/></svg></div>
        <div class="star active"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2.8 2.85 5.78 6.38.93-4.61 4.49 1.09 6.35L12 17.35l-5.71 3 1.09-6.35-4.61-4.49 6.38-.93L12 2.8Z"/></svg></div>
        <div class="star"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2.8 2.85 5.78 6.38.93-4.61 4.49 1.09 6.35L12 17.35l-5.71 3 1.09-6.35-4.61-4.49 6.38-.93L12 2.8Z"/></svg></div>
      </div></section>
      <section class="card chips"><div class="question">よかった点を選んでください</div><div class="chip-grid"><button class="chip selected">親切なスタッフ</button><button class="chip selected">設備が清潔</button><button class="chip">説明が分かりやすい</button><button class="chip">休憩が取りやすい</button><button class="chip">また働きたい</button></div><div class="note">自由記入は任意です。気づいたことがあれば入力できます。</div></section>
    </main>
    <div class="bottom-action"><button class="primary-btn">送信する</button></div>
    <div class="home-indicator"></div>
  </div></div>
</body>
</html>
